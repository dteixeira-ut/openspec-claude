name: Spec Drift Monitor

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  spec-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for spec files
        id: check-specs
        run: |
          if [ -d "openspec/specs" ] && [ "$(ls -A openspec/specs 2>/dev/null)" ]; then
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
            echo "No spec files found in openspec/specs/ — skipping drift check."
          fi

      - name: Gather specs and diff
        if: steps.check-specs.outputs.has_specs == 'true'
        id: gather
        run: |
          SPECS=$(find openspec/specs -name "spec.md" -exec sh -c 'echo "=== $1 ==="; cat "$1"' _ {} \; 2>/dev/null)

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD \
              -- . ':(exclude)openspec/' ':(exclude)*.lock' ':(exclude)*.json' \
              2>/dev/null | head -c 12000)
          else
            DIFF=$(git diff HEAD~1 HEAD \
              -- . ':(exclude)openspec/' ':(exclude)*.lock' ':(exclude)*.json' \
              2>/dev/null | head -c 12000)
          fi

          printf '%s' "$SPECS" > /tmp/specs.txt
          printf '%s' "$DIFF" > /tmp/diff.txt

      - name: Analyze drift via GitHub Models
        if: steps.check-specs.outputs.has_specs == 'true'
        id: analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "You are a spec drift analyzer for a spec-driven development project."
            echo ""
            echo "Review the following OpenSpec capability specs and the code diff. For each capability spec, determine if the code changes align with, diverge from, or are unrelated to the spec requirements."
            echo ""
            echo "SPECS:"
            cat /tmp/specs.txt
            echo ""
            echo "CODE DIFF:"
            cat /tmp/diff.txt
            echo ""
            echo "Produce a concise markdown report in this exact format:"
            echo ""
            echo "## Spec Drift Report"
            echo ""
            echo "| Capability | Status | Notes |"
            echo "|-----------|--------|-------|"
            echo "| <name> | ALIGNED / DRIFTED / MISSING / UNRELATED | <brief explanation, max 15 words> |"
            echo ""
            echo "**Summary:** <1-2 sentences about the overall drift state>"
            echo ""
            echo "Status definitions:"
            echo "- ALIGNED: code change implements or is consistent with the spec"
            echo "- DRIFTED: code change contradicts or diverges from the spec"
            echo "- MISSING: spec requirement has no corresponding implementation in the diff"
            echo "- UNRELATED: code change does not touch this capability"
            echo ""
            echo "Only list DRIFTED or MISSING capabilities if the diff contains no related changes."
            echo "Keep the report concise — skip UNRELATED capabilities if there are more than 3."
          } > /tmp/prompt.txt

          PAYLOAD=$(jq -n \
            --arg model "gpt-4o-mini" \
            --rawfile prompt /tmp/prompt.txt \
            '{model: $model, messages: [{role: "user", content: $prompt}], max_tokens: 800}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | jq -e '.choices[0].message.content' > /dev/null 2>&1; then
            echo "$BODY" | jq -r '.choices[0].message.content' > /tmp/report.txt
            echo "report_available=true" >> $GITHUB_OUTPUT
          else
            echo "report_available=false" >> $GITHUB_OUTPUT
            echo "GitHub Models API returned HTTP $HTTP_CODE — Copilot access may be required." >&2
          fi

      - name: Post drift report as PR comment
        if: >
          github.event_name == 'pull_request' &&
          steps.check-specs.outputs.has_specs == 'true' &&
          steps.analyze.outputs.report_available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "<!-- spec-drift-monitor -->"
            cat /tmp/report.txt
            echo ""
            echo "---"
            echo "> Informational only — this check never blocks merges. Analysis powered by [GitHub Models](https://github.com/marketplace/models)."
          } > /tmp/comment.txt

          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/comment.txt \
            --repo ${{ github.repository }}
